<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM RAPORTOWANIA - Odbioru Techniczne v19.15.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toolbar no-print">
    <div id="stats-box"></div>
    <div class="button-group">
        <button class="btn btn-add" onclick="addFloor()">+ DODAJ KONDYGNACJĘ</button>
        <button class="btn btn-save" onclick="exportData()">ZAPISZ PROJEKT (.JSON)</button>
        <button class="btn btn-load" onclick="document.getElementById('import-file').click()">WCZYTAJ PROJEKT</button>
        <button class="btn btn-print" onclick="window.print()">GENERUJ RAPORT PDF</button>
    </div>
</div>

<input type="file" id="import-file" style="display:none" onchange="importData(event)">

<div id="ov" onclick="closeModal()"></div>
<div id="modal">
    <div class="modal-header">
        <h3 id="m-title">EDYCJA PUNKTU KONTROLNEGO</h3>
        <span class="close-modal" onclick="closeModal()">&times;</span>
    </div>
    
    <div class="modal-body">
        <div class="modal-photo-preview" onclick="uploadImg('report', active.f, active.d)" id="m-photo-box">
            <p>KLIKNIJ TUTAJ, ABY DODAĆ LUB ZMIENIĆ ZDJĘCIE USTERKI</p>
        </div>

        <label>Opis usterki / Uwagi:</label>
        <textarea id="m-desc" class="modal-field" placeholder="Wpisz szczegółowy opis stwierdzonej nieprawidłowości..."></textarea>
        
        <label>Podstawa prawna / Norma / Zalecenia:</label>
        <input id="m-norm" class="modal-field" placeholder="Np. Warunki techniczne, norma PN-EN...">
        
        <label>Status usterki:</label>
        <div class="status-grid">
            <button class="btn c-rep" onclick="setStatus('reported')">ZGŁOSZONE</button>
            <button class="btn c-nrep" onclick="setStatus('not_reported')">NIEZGŁOSZONE</button>
            <button class="btn c-none" onclick="setStatus('to_discuss')">DO OMÓWIENIA</button>
        </div>
    </div>
    
    <div class="modal-footer">
        <button class="btn btn-delete" onclick="deleteReport()">USUŃ PUNKT</button>
        <button class="btn btn-confirm" onclick="closeModal()">ZAPISZ ZMIANY</button>
    </div>
</div>

<div id="app"></div>

<script src="galeria.js"></script>
</body>
</html>
